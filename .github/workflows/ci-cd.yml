# ============================================
# GitHub Actions CI/CD Pipeline
# Project HRIS — Build, Test, Deploy
# ============================================

name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

env:
    NODE_VERSION: "20"
    PNPM_VERSION: "9"
    REGISTRY: ghcr.io
    API_IMAGE: ghcr.io/${{ github.repository_owner }}/hris-api
    WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/hris-web

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ── Lint & Type Check ──────────────────────
    quality:
        name: Code Quality
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm typecheck

    # ── Unit Tests ─────────────────────────────
    test:
        name: Tests
        runs-on: ubuntu-latest
        needs: quality
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: hris_test
                    POSTGRES_PASSWORD: test_password
                    POSTGRES_DB: hris_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U hris_test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            DATABASE_URL: postgresql://hris_test:test_password@localhost:5432/hris_test?schema=public
            JWT_ACCESS_SECRET: test-access-secret-32-chars-long!
            JWT_REFRESH_SECRET: test-refresh-secret-32-chars-long
            REDIS_HOST: localhost
            REDIS_PORT: 6379
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm db:generate
            - run: cd apps/api && npx prisma db push --skip-generate
            - run: pnpm test
            - run: pnpm test:cov
            - uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: apps/api/coverage/
                  retention-days: 7

    # ── Build & Push Docker Images ─────────────
    build:
        name: Build Images
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write
        strategy:
            matrix:
                app: [api, web]
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/${{ matrix.app }}/Dockerfile
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ github.repository_owner }}/hris-${{ matrix.app }}:latest
                      ${{ env.REGISTRY }}/${{ github.repository_owner }}/hris-${{ matrix.app }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ── Deploy to Staging ──────────────────────
    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: staging
        steps:
            - uses: actions/checkout@v4
            - uses: azure/setup-kubectl@v4
            - run: |
                  kubectl set image deployment/hris-api api=${{ env.API_IMAGE }}:${{ github.sha }} -n hris
                  kubectl set image deployment/hris-web web=${{ env.WEB_IMAGE }}:${{ github.sha }} -n hris
                  kubectl rollout status deployment/hris-api -n hris --timeout=300s
                  kubectl rollout status deployment/hris-web -n hris --timeout=300s

    # ── Deploy to Production ───────────────────
    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: deploy-staging
        environment:
            name: production
        steps:
            - uses: actions/checkout@v4
            - uses: azure/setup-kubectl@v4
            - run: |
                  kubectl set image deployment/hris-api api=${{ env.API_IMAGE }}:${{ github.sha }} -n hris
                  kubectl set image deployment/hris-web web=${{ env.WEB_IMAGE }}:${{ github.sha }} -n hris
                  kubectl rollout status deployment/hris-api -n hris --timeout=300s
                  kubectl rollout status deployment/hris-web -n hris --timeout=300s
